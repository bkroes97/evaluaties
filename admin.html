<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Avondevaluatie</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefed;
      --text: #1a1a1a; --text2: #666660; --text3: #999993;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius: 8px; --radius-lg: 12px;
      --green-bg: #eaf3de; --green-text: #3b6d11;
      --red-bg: #fcebeb; --red-text: #a32d2d;
      --amber-bg: #faeeda; --amber-text: #633806;
      --blue-bg: #e6f1fb; --blue-text: #0c447c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg2: #272725; --bg3: #2f2f2d;
        --text: #f0f0ee; --text2: #aaaaaa; --text3: #666660;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --green-bg: #173404; --green-text: #c0dd97;
        --red-bg: #501313; --red-text: #f09595;
        --amber-bg: #412402; --amber-text: #fac775;
        --blue-bg: #042c53; --blue-text: #b5d4f4;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem 3rem; }
    .container { max-width: 900px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
    h1 { font-size: 20px; font-weight: 500; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { padding: 7px 13px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text2); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; transition: background 0.15s; text-decoration: none; }
    .btn:hover { background: var(--bg2); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-primary:hover { opacity: 0.85; background: var(--text); }
    .btn-green { background: var(--green-bg); color: var(--green-text); border-color: var(--green-text); }
    .btn-red { background: var(--red-bg); color: var(--red-text); border-color: var(--red-text); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .section { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .section-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; font-size: 11px; color: var(--text3); font-weight: 500; padding: 6px 8px; border-bottom: 0.5px solid var(--border); text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 8px; border-bottom: 0.5px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
    .badge-wacht { background: var(--amber-bg); color: var(--amber-text); }
    .badge-goed { background: var(--green-bg); color: var(--green-text); }
    .badge-admin { background: var(--blue-bg); color: var(--blue-text); }
    .rol-select { font-family: inherit; font-size: 12px; padding: 3px 6px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); }
    .locatie-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .locatie-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); display: flex; align-items: center; gap: 4px; }
    .locatie-tag.hoofd { background: var(--blue-bg); color: var(--blue-text); }
    .locatie-tag .remove { cursor: pointer; color: var(--text3); font-size: 10px; }
    .locatie-tag .remove:hover { color: var(--red-text); }
    input[type="text"], input[type="email"] { font-family: inherit; font-size: 13px; padding: 6px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); }
    .email-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); display: inline-flex; align-items: center; gap: 4px; margin: 2px; }
    .email-tag .remove { cursor: pointer; color: var(--text3); }
    .email-tag .remove:hover { color: var(--red-text); }
    .add-row { display: flex; gap: 6px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { text-align: center; padding: 2rem; color: var(--text3); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; max-width: 500px; width: 100%; border: 0.5px solid var(--border2); max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--text2); }
    .locatie-checkbox-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; padding: 4px 0; }
    .locatie-checkbox { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .locatie-checkbox input[type="checkbox"] { width: 14px; height: 14px; }
    .hoofd-toggle { font-size: 11px; color: var(--blue-text); cursor: pointer; margin-left: auto; padding: 1px 6px; border-radius: 10px; border: 0.5px solid var(--blue-text); }
    .hoofd-toggle.actief { background: var(--blue-bg); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="ti ti-settings"></i> Beheer</h1>
    <div class="nav">
      <a href="/locatie.html" class="btn"><i class="ti ti-home"></i> Home</a>
      <button class="btn" onclick="uitloggen()"><i class="ti ti-logout"></i> Uitloggen</button>
    </div>
  </div>

  <!-- Wachtende accounts -->
  <div class="section">
    <div class="section-title"><i class="ti ti-clock"></i> Wachtende accounts <span id="wachtBadge" style="font-size:11px;background:var(--amber-bg);color:var(--amber-text);padding:2px 8px;border-radius:20px;display:none;"></span></div>
    <div id="wachtLijst"><div class="loading"><div class="spinner" style="margin:0 auto;"></div></div></div>
  </div>

  <!-- Alle gebruikers -->
  <div class="section">
    <div class="section-title"><i class="ti ti-users"></i> Alle gebruikers</div>
    <div id="gebruikersLijst"><div class="loading"><div class="spinner" style="margin:0 auto;"></div></div></div>
  </div>

  <!-- Locatie e-mailadressen -->
  <div class="section">
    <div class="section-title"><i class="ti ti-mail"></i> E-mailadressen per locatie</div>
    <div id="mailInstellingen"><div class="loading"><div class="spinner" style="margin:0 auto;"></div></div></div>
  </div>
</div>

<!-- Locatie toewijzen modal -->
<div class="modal-overlay" id="locatieModal">
  <div class="modal">
    <h2 id="modalTitel">Locaties toewijzen</h2>
    <div class="locatie-checkbox-list" id="locatieCheckboxes"></div>
    <div style="display:flex;gap:8px;margin-top:1rem;">
      <button class="btn btn-primary" onclick="slaLocatiesOp()">Opslaan</button>
      <button class="btn" onclick="sluitModal()">Annuleren</button>
    </div>
  </div>
</div>

<script>
const _adminUrl  = 'https://gobqaidvirtadgpduznd.supabase.co';
const _adminAnon = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvYnFhaWR2aXJ0YWRncGR1em5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTI0OTgsImV4cCI6MjA5NjY2ODQ5OH0.1e3jxFsGKaylTJCIvqZEP-m-F_j1Az1L06et9DP2rYo';
var supabase = window.supabase.createClient(_adminUrl, _adminAnon);

const ROLLEN = ['admin','rayonmanager','bedrijfsleider','shiftmanager','kijker'];
const ROL_LABELS = { admin:'Admin', rayonmanager:'Rayonmanager', bedrijfsleider:'Bedrijfsleider', shiftmanager:'Shiftmanager', kijker:'Kijker' };

let alleLocaties = [];
let modalGebruikerId = null;
let modalHuidigeLocaties = [];

// ── Auth check ──
async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = '/auth.html'; return; }
  const { data: profiel } = await supabase.from('gebruikers').select('rol,goedgekeurd').eq('id', session.user.id).single();
  if (!profiel?.goedgekeurd || profiel.rol !== 'admin') { window.location.href = '/index.html'; return; }
  laadAlles();
}

async function laadAlles() {
  const { data: locaties } = await supabase.from('locaties').select('*').order('naam');
  alleLocaties = locaties || [];
  await Promise.all([laadWachtenden(), laadGebruikers(), laadMailInstellingen()]);
}

// ── Wachtende accounts ──
async function laadWachtenden() {
  const { data } = await supabase.from('gebruikers').select('*').eq('goedgekeurd', false).order('aangemaakt_op');
  const badge = document.getElementById('wachtBadge');
  if (!data?.length) {
    document.getElementById('wachtLijst').innerHTML = '<p style="font-size:13px;color:var(--text3);font-style:italic;">Geen wachtende accounts.</p>';
    badge.style.display = 'none';
    return;
  }
  badge.textContent = data.length;
  badge.style.display = 'inline-flex';
  document.getElementById('wachtLijst').innerHTML = `
    <table>
      <thead><tr><th>Naam</th><th>E-mail</th><th>Aangevraagd</th><th>Rol</th><th></th></tr></thead>
      <tbody>${data.map(u => `
        <tr id="wacht-${u.id}">
          <td>${escHtml(u.naam)}</td>
          <td>${escHtml(u.email)}</td>
          <td>${formatDatum(u.aangemaakt_op)}</td>
          <td>
            <select class="rol-select" id="rol-wacht-${u.id}">
              ${ROLLEN.map(r => `<option value="${r}" ${r === u.rol ? 'selected' : ''}>${ROL_LABELS[r]}</option>`).join('')}
            </select>
          </td>
          <td style="display:flex;gap:5px;flex-wrap:wrap;">
            <button class="btn btn-green btn-sm" onclick="keurGoed('${u.id}')"><i class="ti ti-check"></i> Goedkeuren</button>
            <button class="btn btn-red btn-sm" onclick="weigeren('${u.id}')"><i class="ti ti-x"></i> Weigeren</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function keurGoed(id) {
  const rol = document.getElementById('rol-wacht-' + id).value;
  await supabase.from('gebruikers').update({ goedgekeurd: true, rol, goedgekeurd_op: new Date().toISOString() }).eq('id', id);
  await laadAlles();
}

async function weigeren(id) {
  if (!confirm('Account verwijderen?')) return;
  await supabase.from('gebruikers').delete().eq('id', id);
  await supabase.auth.admin.deleteUser(id).catch(() => {});
  await laadAlles();
}

// ── Alle gebruikers ──
async function laadGebruikers() {
  const { data: gebruikers } = await supabase.from('gebruikers').select('*').eq('goedgekeurd', true).order('naam');
  const { data: toegangen } = await supabase.from('gebruiker_locaties').select('*');

  if (!gebruikers?.length) {
    document.getElementById('gebruikersLijst').innerHTML = '<p style="font-size:13px;color:var(--text3);font-style:italic;">Geen gebruikers gevonden.</p>';
    return;
  }

  const toegangMap = {};
  (toegangen || []).forEach(t => {
    if (!toegangMap[t.gebruiker_id]) toegangMap[t.gebruiker_id] = [];
    toegangMap[t.gebruiker_id].push(t);
  });

  document.getElementById('gebruikersLijst').innerHTML = `
    <table>
      <thead><tr><th>Naam</th><th>E-mail</th><th>Rol</th><th>Locaties</th><th></th></tr></thead>
      <tbody>${gebruikers.map(u => {
        const locToegang = toegangMap[u.id] || [];
        const locTags = locToegang.map(t => {
          const loc = alleLocaties.find(l => l.id === t.locatie_id);
          return loc ? `<span class="locatie-tag ${t.is_hoofdlocatie ? 'hoofd' : ''}">${t.is_hoofdlocatie ? '⭐ ' : ''}${escHtml(loc.naam)}</span>` : '';
        }).join('');
        return `<tr>
          <td><strong>${escHtml(u.naam)}</strong></td>
          <td style="color:var(--text2)">${escHtml(u.email)}</td>
          <td>
            <select class="rol-select" onchange="updateRol('${u.id}', this.value)">
              ${ROLLEN.map(r => `<option value="${r}" ${r === u.rol ? 'selected' : ''}>${ROL_LABELS[r]}</option>`).join('')}
            </select>
          </td>
          <td>
            <div class="locatie-tags">${locTags || '<span style="font-size:11px;color:var(--text3);font-style:italic;">Geen locaties</span>'}</div>
          </td>
          <td>
            <button class="btn btn-sm" onclick="openLocatieModal('${u.id}', '${escHtml(u.naam)}')"><i class="ti ti-map-pin"></i> Locaties</button>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

async function updateRol(id, rol) {
  await supabase.from('gebruikers').update({ rol }).eq('id', id);
}

// ── Locatie modal ──
async function openLocatieModal(gebruikerId, naam) {
  modalGebruikerId = gebruikerId;
  document.getElementById('modalTitel').textContent = `Locaties voor ${naam}`;

  const { data: huidige } = await supabase.from('gebruiker_locaties').select('*').eq('gebruiker_id', gebruikerId);
  modalHuidigeLocaties = huidige || [];

  const html = alleLocaties.map(loc => {
    const toegang = modalHuidigeLocaties.find(t => t.locatie_id === loc.id);
    return `<div class="locatie-checkbox">
      <input type="checkbox" id="loc-${loc.id}" value="${loc.id}" ${toegang ? 'checked' : ''} onchange="toggleHoofdToggle('${loc.id}')">
      <label for="loc-${loc.id}" style="flex:1;">${escHtml(loc.naam)}</label>
      <span class="hoofd-toggle ${toegang?.is_hoofdlocatie ? 'actief' : ''}" id="hoofd-${loc.id}" onclick="toggleHoofd('${loc.id}')" title="Hoofdlocatie">Hoofd</span>
    </div>`;
  }).join('');

  document.getElementById('locatieCheckboxes').innerHTML = html;
  document.getElementById('locatieModal').classList.add('show');
}

function toggleHoofdToggle(locId) {
  const cb = document.getElementById('loc-' + locId);
  const hoofd = document.getElementById('hoofd-' + locId);
  if (!cb.checked) hoofd.classList.remove('actief');
}

function toggleHoofd(locId) {
  const cb = document.getElementById('loc-' + locId);
  if (!cb.checked) { cb.checked = true; }
  const hoofd = document.getElementById('hoofd-' + locId);
  hoofd.classList.toggle('actief');
}

async function slaLocatiesOp() {
  const nieuweLocaties = alleLocaties
    .filter(loc => document.getElementById('loc-' + loc.id)?.checked)
    .map(loc => ({
      gebruiker_id: modalGebruikerId,
      locatie_id: loc.id,
      is_hoofdlocatie: document.getElementById('hoofd-' + loc.id)?.classList.contains('actief') || false
    }));

  await supabase.from('gebruiker_locaties').delete().eq('gebruiker_id', modalGebruikerId);
  if (nieuweLocaties.length > 0) {
    await supabase.from('gebruiker_locaties').insert(nieuweLocaties);
  }
  sluitModal();
  await laadGebruikers();
}

function sluitModal() {
  document.getElementById('locatieModal').classList.remove('show');
  modalGebruikerId = null;
}

// ── Mail instellingen ──
async function laadMailInstellingen() {
  const html = alleLocaties.map(loc => `
    <div style="margin-bottom:1rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border);">
      <div style="font-size:13px;font-weight:500;margin-bottom:6px;">${escHtml(loc.naam)}</div>
      <div id="emails-${loc.id}" style="margin-bottom:6px;">
        ${(loc.email_adressen || []).map(e => emailTag(loc.id, e)).join('')}
      </div>
      <div class="add-row">
        <input type="email" id="nieuw-email-${loc.id}" placeholder="nieuw@email.nl" style="flex:1;min-width:180px;" onkeydown="if(event.key==='Enter')voegEmailToe('${loc.id}')" />
        <button class="btn btn-sm" onclick="voegEmailToe('${loc.id}')"><i class="ti ti-plus"></i> Toevoegen</button>
      </div>
    </div>`).join('');
  document.getElementById('mailInstellingen').innerHTML = html;
}

function emailTag(locId, email) {
  return `<span class="email-tag">${escHtml(email)}<span class="remove" onclick="verwijderEmail('${locId}','${escHtml(email)}')">&times;</span></span>`;
}

async function voegEmailToe(locId) {
  const inp = document.getElementById('nieuw-email-' + locId);
  const email = inp.value.trim().toLowerCase();
  if (!email || !email.includes('@')) return;
  const loc = alleLocaties.find(l => l.id === locId);
  if (!loc) return;
  const emails = [...(loc.email_adressen || [])];
  if (emails.includes(email)) { inp.value = ''; return; }
  emails.push(email);
  await supabase.from('locaties').update({ email_adressen: emails }).eq('id', locId);
  loc.email_adressen = emails;
  inp.value = '';
  document.getElementById('emails-' + locId).innerHTML = emails.map(e => emailTag(locId, e)).join('');
}

async function verwijderEmail(locId, email) {
  const loc = alleLocaties.find(l => l.id === locId);
  if (!loc) return;
  const emails = (loc.email_adressen || []).filter(e => e !== email);
  await supabase.from('locaties').update({ email_adressen: emails }).eq('id', locId);
  loc.email_adressen = emails;
  document.getElementById('emails-' + locId).innerHTML = emails.map(e => emailTag(locId, e)).join('');
}

// ── Helpers ──
function formatDatum(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric' });
}

function escHtml(t) {
  if (!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function uitloggen() {
  await supabase.auth.signOut();
  window.location.href = '/auth.html';
}

// ── Init ──
checkAuth();
</script>
</body>
</html>
