<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avondevaluatie</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefed;
      --text: #1a1a1a; --text2: #666660; --text3: #999993;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius: 8px; --radius-lg: 12px;
      --green-bg: #eaf3de; --green-text: #3b6d11;
      --amber-bg: #faeeda; --amber-text: #633806;
      --blue-bg: #e6f1fb; --blue-text: #0c447c;
      --red-bg: #fcebeb; --red-text: #a32d2d;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg2: #272725; --bg3: #2f2f2d;
        --text: #f0f0ee; --text2: #aaaaaa; --text3: #666660;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --green-bg: #173404; --green-text: #c0dd97;
        --amber-bg: #412402; --amber-text: #fac775;
        --blue-bg: #042c53; --blue-text: #b5d4f4;
        --red-bg: #501313; --red-text: #f09595;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem 3rem; }
    .container { max-width: 720px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
    .header-left h1 { font-size: 20px; font-weight: 500; }
    .header-left .welkom { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .header-right { display: flex; gap: 8px; }
    .btn { padding: 7px 13px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text2); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; transition: background 0.15s; text-decoration: none; }
    .btn:hover { background: var(--bg2); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-primary:hover { opacity: 0.85; background: var(--text); }

    /* Locatie tabs */
    .locatie-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .locatie-tab { padding: 7px 14px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: 20px; background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .locatie-tab:hover { background: var(--bg2); }
    .locatie-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* Locatie sectie */
    .locatie-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
    .locatie-naam { font-size: 18px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .locatie-naam i { color: var(--text2); }

    /* Filter bar */
    .filterbar { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 10px 14px; margin-bottom: 1rem; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
    .filter-select { font-family: inherit; font-size: 13px; padding: 5px 9px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); }
    .filter-reset { font-size: 12px; color: var(--text3); cursor: pointer; padding: 4px 8px; border-radius: var(--radius); border: 0.5px solid var(--border); background: none; font-family: inherit; }
    .filter-reset:hover { color: var(--text); background: var(--bg2); }

    /* Evaluatie lijst */
    .eval-list { display: flex; flex-direction: column; gap: 8px; }
    .eval-item { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; text-decoration: none; color: var(--text); }
    .eval-item:hover { border-color: var(--border2); background: var(--bg2); }
    .eval-item.concept { border-left: 3px solid var(--amber-text); }
    .eval-item.afgerond { border-left: 3px solid var(--green-text); }
    .eval-datum { font-size: 13px; font-weight: 500; white-space: nowrap; min-width: 120px; }
    .eval-onderwerp { font-size: 13px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .eval-manager { font-size: 12px; color: var(--text3); white-space: nowrap; }
    .eval-status { font-size: 11px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
    .eval-status.concept { background: var(--amber-bg); color: var(--amber-text); }
    .eval-status.afgerond { background: var(--green-bg); color: var(--green-text); }
    .eval-arrow { color: var(--text3); font-size: 14px; flex-shrink: 0; }

    /* Leeg / laden */
    .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text3); font-size: 13px; }
    .empty i { font-size: 32px; display: block; margin-bottom: 8px; }
    .loading { text-align: center; padding: 2rem; color: var(--text3); }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadein { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
    .eval-item { animation: fadein 0.15s ease; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <h1>Avondevaluatie</h1>
      <div class="welkom" id="welkomTekst"></div>
    </div>
    <div class="header-right">
      <a href="/dashboard.html" class="btn"><i class="ti ti-layout-dashboard"></i> Alle evaluaties</a>
      <button class="btn" onclick="uitloggen()"><i class="ti ti-logout"></i> Uitloggen</button>
    </div>
  </div>

  <!-- Locatie tabs -->
  <div class="locatie-tabs" id="locatieTabs">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- Locatie inhoud -->
  <div id="locatieInhoud">
    <div class="loading"><div class="spinner"></div>Laden...</div>
  </div>

</div>

<script>
const _locUrl  = 'https://gobqaidvirtadgpduznd.supabase.co';
const _locAnon = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvYnFhaWR2aXJ0YWRncGR1em5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTI0OTgsImV4cCI6MjA5NjY2ODQ5OH0.1e3jxFsGKaylTJCIvqZEP-m-F_j1Az1L06et9DP2rYo';
var supabase = window.supabase.createClient(_locUrl, _locAnon);

const LOCATIE_ICONS = {
  'Café Van Buren': 'ti-coffee', 'Club Rolluik': 'ti-music', 'BAR 2': 'ti-glass',
  'De Drie Gezusters': 'ti-star', "Heidi's Skihut": 'ti-mountain', 'De Kunstbar': 'ti-palette',
  'Club Novia': 'ti-diamond', 'De Bieb': 'ti-books', 'Stadsgarderobe 024': 'ti-hanger'
};

let alleLocaties   = [];
let actieveLocatie = null;
let evaluaties     = {};
let filterJaar     = '';
let filterMaand    = '';
let filterDag      = '';

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = '/auth.html'; return; }

  const { data: profiel } = await supabase
    .from('gebruikers')
    .select('naam, rol, goedgekeurd, gebruiker_locaties(locatie_id, is_hoofdlocatie)')
    .eq('id', session.user.id)
    .single();

  if (!profiel?.goedgekeurd) { window.location.href = '/auth.html'; return; }

  document.getElementById('welkomTekst').textContent = profiel.naam;

  // Haal locaties op
  let locaties = [];
  if (profiel.rol === 'admin' || profiel.rol === 'rayonmanager') {
    const { data } = await supabase.from('locaties').select('*').eq('actief', true).order('naam');
    locaties = data || [];
  } else if (profiel.rol === 'kijker') {
    // Kijker heeft geen locatie tabs — stuur direct naar dashboard
    window.location.href = '/dashboard.html';
    return;
  } else {
    const locatieIds = (profiel.gebruiker_locaties || []).map(t => t.locatie_id);
    if (locatieIds.length > 0) {
      const { data } = await supabase.from('locaties').select('*').in('id', locatieIds).order('naam');
      locaties = data || [];
    }
  }

  alleLocaties = locaties;

  if (locaties.length === 0) {
    document.getElementById('locatieTabs').innerHTML = '';
    document.getElementById('locatieInhoud').innerHTML = '<div class="empty"><i class="ti ti-map-pin-off"></i>Geen locaties toegewezen. Neem contact op met een beheerder.</div>';
    return;
  }

  renderTabs();
  selecteerLocatie(locaties[0].naam);
}

function renderTabs() {
  document.getElementById('locatieTabs').innerHTML = alleLocaties.map(loc =>
    `<button class="locatie-tab ${loc.naam === actieveLocatie ? 'active' : ''}"
      onclick="selecteerLocatie('${escHtml(loc.naam)}')">${escHtml(loc.naam)}</button>`
  ).join('');
}

async function selecteerLocatie(naam) {
  actieveLocatie = naam;
  filterJaar = ''; filterMaand = ''; filterDag = '';
  renderTabs();

  document.getElementById('locatieInhoud').innerHTML = '<div class="loading"><div class="spinner"></div>Evaluaties laden...</div>';

  // Haal evaluaties op voor deze locatie
  if (!evaluaties[naam]) {
    const { data: { session } } = await supabase.auth.getSession();
    const token = session?.access_token || '';
    const res = await fetch(`/.netlify/functions/evaluaties?locatie=${encodeURIComponent(naam)}&limit=500`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    evaluaties[naam] = Array.isArray(data) ? data : [];
  }

  renderLocatieInhoud();
}

function renderLocatieInhoud() {
  const naam = actieveLocatie;
  const icon = LOCATIE_ICONS[naam] || 'ti-building';
  let items = evaluaties[naam] || [];

  // Bouw filter opties
  const jaren  = [...new Set(items.map(e => e.datum?.substring(0,4)).filter(Boolean))].sort().reverse();
  const maanden = filterJaar ? [...new Set(items.filter(e => e.datum?.startsWith(filterJaar)).map(e => e.datum?.substring(5,7)).filter(Boolean))].sort().reverse() : [];
  const dagen  = (filterJaar && filterMaand) ? [...new Set(items.filter(e => e.datum?.startsWith(`${filterJaar}-${filterMaand}`)).map(e => e.datum?.substring(8,10)).filter(Boolean))].sort().reverse() : [];

  // Filter toepassen
  if (filterJaar)  items = items.filter(e => e.datum?.startsWith(filterJaar));
  if (filterMaand) items = items.filter(e => e.datum?.substring(5,7) === filterMaand);
  if (filterDag)   items = items.filter(e => e.datum?.substring(8,10) === filterDag);

  const MAAND_NL = ['','jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

  let html = `
    <div class="locatie-header">
      <div class="locatie-naam"><i class="ti ${icon}"></i>${escHtml(naam)}</div>
      <a href="/index.html?locatie=${encodeURIComponent(naam)}" class="btn btn-primary">
        <i class="ti ti-plus"></i> Evaluatie toevoegen
      </a>
    </div>

    <div class="filterbar">
      <div class="filter-group">
        <span class="filter-label">Jaar</span>
        <select class="filter-select" onchange="setFilter('jaar', this.value)">
          <option value="">Alle jaren</option>
          ${jaren.map(j => `<option value="${j}" ${j === filterJaar ? 'selected' : ''}>${j}</option>`).join('')}
        </select>
      </div>
      ${filterJaar ? `
      <div class="filter-group">
        <span class="filter-label">Maand</span>
        <select class="filter-select" onchange="setFilter('maand', this.value)">
          <option value="">Alle maanden</option>
          ${maanden.map(m => `<option value="${m}" ${m === filterMaand ? 'selected' : ''}>${MAAND_NL[parseInt(m)]}</option>`).join('')}
        </select>
      </div>` : ''}
      ${filterJaar && filterMaand ? `
      <div class="filter-group">
        <span class="filter-label">Dag</span>
        <select class="filter-select" onchange="setFilter('dag', this.value)">
          <option value="">Alle dagen</option>
          ${dagen.map(d => `<option value="${d}" ${d === filterDag ? 'selected' : ''}>${parseInt(d)}</option>`).join('')}
        </select>
      </div>` : ''}
      ${filterJaar ? `<button class="filter-reset" onclick="resetFilter()"><i class="ti ti-x" style="font-size:11px;"></i> Reset</button>` : ''}
      <span style="margin-left:auto;font-size:12px;color:var(--text3);">${items.length} evaluatie${items.length !== 1 ? 's' : ''}</span>
    </div>

    <div class="eval-list">`;

  if (items.length === 0) {
    html += `<div class="empty"><i class="ti ti-clipboard-off"></i>Geen evaluaties gevonden</div>`;
  } else {
    html += items.map(e => {
      const isConcept = !e.evaluatie_tekst || e.status === 'concept';
      const url = isConcept
        ? `/index.html?locatie=${encodeURIComponent(naam)}&eval_id=${e.id}`
        : `/index.html?locatie=${encodeURIComponent(naam)}&eval_id=${e.id}`;
      const datum = e.datum ? new Date(e.datum).toLocaleDateString('nl-NL', { weekday:'short', day:'numeric', month:'short', year:'numeric' }) : '—';
      return `<a class="eval-item ${isConcept ? 'concept' : 'afgerond'}" href="${url}">
        <span class="eval-datum">${datum}</span>
        <span class="eval-onderwerp">${escHtml(e.onderwerp || e.locatie || '—')}</span>
        <span class="eval-manager">${escHtml(e.manager || '')}</span>
        <span class="eval-status ${isConcept ? 'concept' : 'afgerond'}">${isConcept ? 'Concept' : 'Afgerond'}</span>
        <i class="ti ti-chevron-right eval-arrow"></i>
      </a>`;
    }).join('');
  }

  html += `</div>`;
  document.getElementById('locatieInhoud').innerHTML = html;
}

function setFilter(type, val) {
  if (type === 'jaar')  { filterJaar = val; filterMaand = ''; filterDag = ''; }
  if (type === 'maand') { filterMaand = val; filterDag = ''; }
  if (type === 'dag')   { filterDag = val; }
  renderLocatieInhoud();
}

function resetFilter() {
  filterJaar = ''; filterMaand = ''; filterDag = '';
  renderLocatieInhoud();
}

function escHtml(t) {
  return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function uitloggen() {
  await supabase.auth.signOut();
  window.location.href = '/auth.html';
}

init();
</script>
</body>
</html>
