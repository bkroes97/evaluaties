<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KO-Company</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/ko-nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefed;
      --text: #1a1a1a; --text2: #666660; --text3: #999993;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
      --radius: 10px; --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --bg2: #242422; --bg3: #2c2c2a;
        --text: #f0f0ee; --text2: #aaaaaa; --text3: #666660;
        --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
    .ko-page { max-width: 800px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    /* Hero */
    .hero {
      display: flex;
      align-items: center;
      gap: 1.75rem;
      margin-bottom: 2.5rem;
    }

    .orb-container {
      position: relative;
      width: 96px;
      height: 96px;
      flex-shrink: 0;
    }

    /* Outer glow ring */
    .orb-container::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 28px;
      background: transparent;
      box-shadow:
        0 0 20px 4px rgba(180,160,120,0.18),
        0 0 40px 8px rgba(120,100,60,0.10);
      animation: pulseGlow 3s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    canvas#orb {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      position: relative;
      z-index: 1;
      display: block;
    }

    .welkom-sub { font-size: 13px; color: var(--text3); margin-bottom: 4px; }
    .welkom h2 { font-size: 24px; font-weight: 500; letter-spacing: -0.02em; }

    .sectie-titel { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin: 2rem 0 10px; }
    .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

    .module-kaart {
      background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg);
      padding: 1.5rem; cursor: pointer; transition: all 0.15s; text-decoration: none;
      color: var(--text); display: flex; flex-direction: column; gap: 12px;
      position: relative; overflow: hidden;
    }
    .module-kaart:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .module-kaart.locked { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    .module-icon { width: 44px; height: 44px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .module-icon.eval { background: #eaf3de; color: #3b6d11; }
    .module-icon.scan { background: #e6f1fb; color: #0c447c; }

    .module-naam { font-size: 15px; font-weight: 500; }
    .module-omschrijving { font-size: 12px; color: var(--text3); line-height: 1.5; }
    .module-arrow { position: absolute; bottom: 1.25rem; right: 1.25rem; font-size: 16px; color: var(--text3); }
    .module-badge { position: absolute; top: 1rem; right: 1rem; font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--bg2); color: var(--text3); font-weight: 500; }

    .activiteit-lijst { display: flex; flex-direction: column; gap: 6px; }
    .activiteit-item { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .activiteit-icon { font-size: 16px; color: var(--text3); flex-shrink: 0; }
    .activiteit-tekst { flex: 1; color: var(--text2); }
    .activiteit-tijd { font-size: 11px; color: var(--text3); white-space: nowrap; }

    .spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 2rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .module-kaart { animation: fadein 0.2s ease both; }
    .module-kaart:nth-child(2) { animation-delay: 0.05s; }
    .module-kaart:nth-child(3) { animation-delay: 0.10s; }
  </style>
</head>
<body>

<div class="ko-page">
  <div class="hero">
    <div class="orb-container">
      <canvas id="orb" width="192" height="192"></canvas>
    </div>
    <div>
      <div class="welkom-sub" id="welkomDag"></div>
      <h2 id="welkomNaam">Welkom</h2>
    </div>
  </div>

  <div class="sectie-titel">Modules</div>
  <div class="module-grid" id="moduleGrid"><div class="spinner"></div></div>

  <div class="sectie-titel">Recente activiteit</div>
  <div class="activiteit-lijst" id="activiteitLijst"><div class="spinner"></div></div>
</div>

  function draw() {
    t += 0.008;
    ctx.clearRect(0, 0, S, S);

    ctx.save();
    clipRounded(R);
    ctx.clip();

    // === 1. Achtergrond: diep zwart met warme kern ===
    const bg = ctx.createRadialGradient(CX * 0.8, CY * 0.7, 0, CX, CY, S * 0.9);
    bg.addColorStop(0,   '#1c1b17');
    bg.addColorStop(0.4, '#0e0d0b');
    bg.addColorStop(1,   '#020201');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, S, S);

    // === 2. Logo ===
    // Blend mode multiply zodat het logo mooi in het donker zit
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.55;
    ctx.drawImage(logo, 24, 24, S - 48, S - 48);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    // === 3. Grote ronddraaiende gloed (warm goud/wit) ===
    // Primaire spot — draait aan buitenkant
    const orbitA = S * 0.30;
    const lx1 = CX + Math.cos(t) * orbitA;
    const ly1 = CY + Math.sin(t) * orbitA * 0.55;

    const sweep1 = ctx.createRadialGradient(lx1, ly1, 0, lx1, ly1, S * 0.55);
    sweep1.addColorStop(0,   'rgba(255,240,200,0.28)');
    sweep1.addColorStop(0.25,'rgba(255,220,140,0.14)');
    sweep1.addColorStop(0.6, 'rgba(200,160,80,0.05)');
    sweep1.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = sweep1;
    ctx.fillRect(0, 0, S, S);

    // Scherpe lichtpunt op de spot
    const spot1 = ctx.createRadialGradient(lx1, ly1, 0, lx1, ly1, S * 0.13);
    spot1.addColorStop(0,   'rgba(255,252,235,0.90)');
    spot1.addColorStop(0.2, 'rgba(255,240,180,0.40)');
    spot1.addColorStop(0.6, 'rgba(255,220,120,0.10)');
    spot1.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = spot1;
    ctx.fillRect(0, 0, S, S);

    // === 4. Secundaire spot — trager, aan de andere kant ===
    const lx2 = CX + Math.cos(t * 0.7 + Math.PI * 1.3) * orbitA * 0.75;
    const ly2 = CY + Math.sin(t * 0.7 + Math.PI * 1.3) * orbitA * 0.45;

    const spot2 = ctx.createRadialGradient(lx2, ly2, 0, lx2, ly2, S * 0.10);
    spot2.addColorStop(0,   'rgba(200,220,255,0.45)');
    spot2.addColorStop(0.4, 'rgba(160,190,255,0.12)');
    spot2.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = spot2;
    ctx.fillRect(0, 0, S, S);

    // === 5. Vaste highlight linksboven (glazen bol top-glans) ===
    const topGlare = ctx.createRadialGradient(CX * 0.55, CY * 0.38, 0, CX * 0.55, CY * 0.38, S * 0.22);
    topGlare.addColorStop(0,   'rgba(255,255,255,0.30)');
    topGlare.addColorStop(0.4, 'rgba(255,255,255,0.08)');
    topGlare.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = topGlare;
    ctx.fillRect(0, 0, S, S);

    // === 6. Subtiele scan-lijn die langzaam omhoog beweegt ===
    const scanY = ((t * 12) % (S + 40)) - 20;
    const scanGrad = ctx.createLinearGradient(0, scanY - 8, 0, scanY + 8);
    scanGrad.addColorStop(0,   'rgba(255,255,255,0)');
    scanGrad.addColorStop(0.5, 'rgba(255,255,255,0.06)');
    scanGrad.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = scanGrad;
    ctx.fillRect(0, scanY - 8, S, 16);

    // === 7. Vignette (donkere rand) ===
    const vig = ctx.createRadialGradient(CX, CY, S * 0.25, CX, CY, S * 0.78);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.72)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, S, S);

    ctx.restore();

    // === 8. Rand: dunne goudachtige lijn ===
    ctx.save();
    clipRounded(R);
    ctx.strokeStyle = 'rgba(200,180,120,0.22)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();

    rafId = requestAnimationFrame(draw);
  }

  logo.onload = draw;
  logo.onerror = function() {
    // Fallback zonder logo
    draw();
  };

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) cancelAnimationFrame(rafId);

  });
})();

<script>
const _homeUrl  = 'https://gobqaidvirtadgpduznd.supabase.co';
const _homeAnon = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvYnFhaWR2aXJ0YWRncGR1em5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTI0OTgsImV4cCI6MjA5NjY2ODQ5OH0.1e3jxFsGKaylTJCIvqZEP-m-F_j1Az1L06et9DP2rYo';
var supabase = window.supabase.createClient(_homeUrl, _homeAnon);
window._supabase = supabase;

const ALLE_MODULES = [
  { id: 'evaluaties', naam: 'Evaluaties', omschrijving: 'Avondevaluaties schrijven en beheren per locatie', icon: 'ti-clipboard-text', iconClass: 'eval', href: '/locatie.html', badge: null },
  { id: 'pakbonnen', naam: 'Pakbonnen', omschrijving: 'Pakbonnen inscannen en verwerken', icon: 'ti-scan', iconClass: 'scan', href: '/pakbonnen.html', badge: 'Binnenkort', locked: true }
];

const DAG_NL = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const MAAND_NL = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = '/auth.html'; return; }
  const { data: profiel } = await supabase.from('gebruikers').select('naam, rol, goedgekeurd').eq('id', session.user.id).single();
  if (!profiel?.goedgekeurd) { window.location.href = '/auth.html'; return; }

  const nu = new Date();
  const uur = nu.getHours();
  const dagdeel = uur < 12 ? 'Goedemorgen' : uur < 18 ? 'Goedemiddag' : 'Goedenavond';
  document.getElementById('welkomDag').textContent = dagdeel + ' — ' + DAG_NL[nu.getDay()] + ' ' + nu.getDate() + ' ' + MAAND_NL[nu.getMonth()];
  document.getElementById('welkomNaam').textContent = profiel.naam || 'Welkom';

  KONav.init({ module: null, crumbs: [] });
  renderModules(profiel.rol);
  laadActiviteit(session.access_token);
}

function renderModules(rol) {
  const grid = document.getElementById('moduleGrid');
  grid.innerHTML = '';
  ALLE_MODULES.forEach(function(mod, i) {
    const kaart = document.createElement('a');
    kaart.href = mod.locked ? '#' : mod.href;
    kaart.className = 'module-kaart' + (mod.locked ? ' locked' : '');
    kaart.style.animationDelay = (i * 0.05) + 's';
    kaart.innerHTML =
      (mod.badge ? '<span class="module-badge">' + mod.badge + '</span>' : '') +
      '<div class="module-icon ' + mod.iconClass + '"><i class="ti ' + mod.icon + '"></i></div>' +
      '<div><div class="module-naam">' + mod.naam + '</div><div class="module-omschrijving">' + mod.omschrijving + '</div></div>' +
      (!mod.locked ? '<i class="ti ti-arrow-right module-arrow"></i>' : '');
    grid.appendChild(kaart);
  });
}

async function laadActiviteit(token) {
  try {
    const res = await fetch('/.netlify/functions/evaluaties?limit=5', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    const lijst = document.getElementById('activiteitLijst');
    if (!Array.isArray(data) || data.length === 0) {
      lijst.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:10px 0;">Nog geen activiteit</div>';
      return;
    }
    lijst.innerHTML = data.map(function(e) {
      const isConcept = !e.evaluatie_tekst || e.status === 'concept';
      const datum = e.datum ? new Date(e.datum).toLocaleDateString('nl-NL', { day:'numeric', month:'short' }) : '—';
      return '<div class="activiteit-item"><i class="ti ' + (isConcept ? 'ti-pencil' : 'ti-check') + ' activiteit-icon"></i><span class="activiteit-tekst">' + (e.locatie || '—') + ' — ' + (e.onderwerp || e.manager || '—') + '</span><span class="activiteit-tijd">' + datum + '</span></div>';
    }).join('');
  } catch(e) {
    document.getElementById('activiteitLijst').innerHTML = '';
  }
}

init();
</script>
